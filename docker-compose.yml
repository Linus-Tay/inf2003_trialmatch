services:
  mariadb:
    image: mariadb:11
    container_name: trialmatch-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DB}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - trialmatch_mariadb_data:/var/lib/mysql
      - ./database/mariadb/init:/docker-entrypoint-initdb.d:ro

  mongodb:
    image: mongo:7
    container_name: trialmatch-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - trialmatch_mongodb_data:/data/db
      - ./database/mongodb/init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:latest
    container_name: trialmatch-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mariadb

volumes:
  trialmatch_mariadb_data:
  trialmatch_mongodb_data:
